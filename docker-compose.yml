services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: easy_invoice_mgr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/sql/base.sql:/docker-entrypoint-initdb.d/01_base.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d easy_invoice_mgr"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-root}@postgres:5432/easy_invoice_mgr
      SECRET_KEY: ${SECRET_KEY:-easy-invoice-mgr-secret-key}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-easy-invoice-mgr-jwt-secret-32bytes}
      STORAGE_BACKEND: local
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      GLM_API_KEY: ${GLM_API_KEY:-}
      GLM_MODEL: ${GLM_MODEL:-glm-4.6v-flash}
    volumes:
      - uploads:/app/uploads
      - exports:/app/exports
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:5000/api}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  exports:
